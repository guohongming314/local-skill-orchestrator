name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python 3.12 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Local equivalent: uv sync --locked --all-groups
      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      # Local equivalent: uv run pytest
      - name: Run tests
        run: uv run pytest

      # Local equivalent: uv run ruff check .
      - name: Run Ruff
        run: uv run ruff check .

      # Local equivalent: uv run mypy src tests
      - name: Run mypy
        run: uv run mypy src tests

      # Local equivalent: uv build
      - name: Build distributions
        run: uv build

      # Local equivalent: git diff --check
      - name: Check whitespace
        run: git diff --check