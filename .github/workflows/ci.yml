name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python 3.12 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Local equivalent: uv sync --locked --all-groups
      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      # Local equivalent: uv run pytest tests/skills/test_skills.py tests/e2e
      - name: Validate Skills and end-to-end scenarios
        run: uv run pytest tests/skills/test_skills.py tests/e2e

      # Local equivalent: uv run pytest
      - name: Run tests
        run: uv run pytest

      - name: Enforce latest validation round release gate
        run: uv run python scripts/validation/check_release_gate.py --rounds docs/evaluation/validation-rounds

      - name: Enforce task-routing evaluation thresholds
        run: uv run python -m vibe.evaluation.task_routing --samples tests/scenarios/tasks --output tests/results/task-routing.json --thresholds tests/evaluation/task-routing/thresholds.json

      - name: Check evaluation result freshness
        run: git diff --exit-code -- tests/results/task-routing.json

      # Local equivalent: uv run ruff check .
      - name: Run Ruff
        run: uv run ruff check .

      # Local equivalent: uv run mypy src tests
      - name: Run mypy
        run: uv run mypy src tests

      # Local equivalent: uv build
      - name: Build distributions
        run: uv build

      # Local equivalent: git diff --check
      - name: Check whitespace
        run: git diff --check