schema_version: '1'
pack_id: base-engineering
name: Base Engineering
description: Baseline engineering practices for every repository
priority: 100
match:
  all_of:
    - field: project_name
      operator: exists
      value: true
requirements:
  - requirement_id: repository-exploration
    capability: repository.exploration
    strength: required
    rationale: Inspect and search the repository before changes
    verification:
      - Verify repository facts and affected files
  - requirement_id: quality-gates
    capability: quality.gates
    strength: required
    rationale: Run project quality gates before completion
    verification:
      - Run focused and full test suites
