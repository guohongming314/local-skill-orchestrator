schema_version: '1'
pack_id: web-application
name: Web Application
description: Browser-facing application delivery practices
priority: 50
match:
  all_of:
    - field: project_type
      operator: equals
      value: web-application
requirements:
  - requirement_id: browser-validation
    capability: browser.validation
    strength: recommended
    rationale: Validate user-visible browser behavior
    verification:
      - Exercise the primary browser flow
  - requirement_id: accessibility-review
    capability: accessibility.review
    strength: optional
    rationale: Review accessible interaction semantics
    verification:
      - Run an accessibility audit
